name: jaskuy_sales_app
description: "Aesthetic Jaskuy Mobile App for Sales Agent Team (Android & iOS)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Core API & Storage
  http: ^1.2.0
  shared_preferences: ^2.2.2
  provider: ^6.1.2
  
  # Camera & UI Enhancements
  image_picker: ^1.0.7
  google_fonts: ^6.1.0
  
  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/
